<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipmark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/side-panel.css">
  <script src="../popup/theme-loader.js"></script>
</head>
<body class="side-panel-root">

<div class="side-panel-container">

  <!-- Glass Header -->
  <header class="side-panel-header">
    <div class="side-panel-logo">
      <img src="../../assets/icons/icon-48.png" class="sp-logo-sym" alt="Clipmark">
      <span class="sp-logo-text">Clipmark</span>
    </div>
    <div class="side-panel-header-actions">
      <div id="user-chip" class="user-chip" style="display:none;"></div>
      <button id="signin-btn" class="sp-icon-btn signin-btn" title="Sign in to sync across devices" style="display:none;">
        <span class="material-symbols-outlined" style="font-size:18px;">person</span>
      </button>
      <button id="signout-btn" class="sp-icon-btn signout-btn" title="Sign out" style="display:none;">
        <span class="material-symbols-outlined" style="font-size:16px;">logout</span>
      </button>
      <button class="sp-icon-btn" title="Help">
        <span class="material-symbols-outlined">help</span>
      </button>
      <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark theme">
        <span class="theme-icon">☀️</span>
      </button>
    </div>
  </header>

  <div id="status-message" class="status-message"></div>

  <!-- Scrollable main content -->
  <main class="sp-main">

    <!-- AI Insights Card -->
    <section class="sp-section">
      <button class="ai-insights-card" id="summarize-btn">
        <div class="ai-insights-left">
          <div class="ai-insights-icon">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">auto_awesome</span>
          </div>
          <div class="ai-insights-text">
            <span class="ai-insights-label">AI Insights</span>
            <span class="ai-insights-title">Summary</span>
          </div>
        </div>
        <span class="material-symbols-outlined ai-insights-chevron">chevron_right</span>
        <div class="ai-insights-bg" aria-hidden="true"></div>
      </button>
    </section>

    <!-- Quick Capture Section -->
    <section class="sp-section sp-capture-section">
      <div class="sp-capture-card">
        <!-- Video context -->
        <div class="video-context">
          <div class="video-context-title" id="video-title">
            🎬 <span class="title-shimmer"></span>
          </div>
          <div id="current-time" class="timestamp-pill">⏱ 00:00</div>
        </div>

        <!-- Note input -->
        <div class="description-row">
          <input type="text" id="description" placeholder="Add a note…" class="sp-input">
          <button id="auto-fill-btn" class="auto-fill-btn-sp" title="Auto-fill from transcript">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;font-size:14px;vertical-align:middle;">auto_awesome</span>
          </button>
        </div>
        <div class="quick-tags">
          <button class="quick-tag-btn" data-tag="important">#important</button>
          <button class="quick-tag-btn" data-tag="note">#note</button>
          <button class="quick-tag-btn" data-tag="review">#review</button>
          <button class="quick-tag-btn" data-tag="idea">#idea</button>
        </div>
        <div id="tag-suggestions" class="tag-suggestions" style="display:none;"></div>

        <!-- Save button -->
        <button id="add-bookmark" class="sp-btn-primary" title="Save bookmark (Alt+S)">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;font-size:18px;vertical-align:middle;">add_circle</span>
          Save Moment
        </button>
      </div>
    </section>

    <!-- Revisit reminder -->
    <div id="revisit-reminder-panel" class="revisit-reminder-panel"></div>

    <!-- Bookmarks Timeline -->
    <section class="sp-section sp-bookmarks-section">
      <div class="sp-bookmarks-header">
        <h2 class="sp-bookmarks-title">Bookmarks</h2>
        <a href="#" id="dashboard-link" class="sp-view-all-link" title="Open full dashboard">
          <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">open_in_new</span>
          All
        </a>
      </div>
      <div id="revision-today" class="revision-today" style="display:none;"></div>
      <div id="bookmark-list" class="sp-bookmark-list">
        <div class="loading-spinner" style="display:none;">Loading…</div>
      </div>
    </section>

    <!-- Social Integration -->
    <section class="sp-section sp-social-section">
      <div class="sp-social-inner">
        <div class="sp-social-info">
          <p class="sp-social-sup">Share the insight</p>
          <h3 class="sp-social-title">Post to Social</h3>
        </div>
        <button class="sp-social-cta" id="share-btn">
          <span class="material-symbols-outlined" style="font-size:18px;">ios_share</span>
          Generate Post
        </button>
      </div>
    </section>

  </main>

  <!-- Bottom Navigation -->
  <nav class="sp-bottom-nav">
    <button class="sp-nav-tab sp-nav-tab--active" id="sp-tab-save">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">add_circle</span>
      <span class="sp-nav-label">Save</span>
    </button>
    <button class="sp-nav-tab" id="summarize-btn-nav" onclick="document.getElementById('summarize-btn').click()">
      <span class="material-symbols-outlined">auto_awesome</span>
      <span class="sp-nav-label">Summary</span>
    </button>
    <button class="sp-nav-tab" id="sp-tab-library" onclick="chrome.tabs.create({ url: chrome.runtime.getURL('src/pages/bookmarks.html') })">
      <span class="material-symbols-outlined">video_library</span>
      <span class="sp-nav-label">Library</span>
    </button>
  </nav>

  <div id="error-message" class="error-message"></div>

  <!-- Summary Panel Overlay -->
  <div id="summary-panel" class="summary-panel-overlay" style="display:none;">
    <div class="summary-panel-content">
      <div class="summary-header">
        <span class="summary-title">✦ Summary</span>
        <button id="summary-close" class="overlay-close" title="Close">&times;</button>
      </div>
      <div id="summary-content" class="summary-body"></div>
    </div>
  </div>

  <!-- Social Panel Overlay -->
  <div id="social-panel" class="social-panel-overlay" style="display:none;">
    <div class="social-panel-content">
      <div class="social-header">
        <span class="social-title">✍ Post Insights</span>
        <button id="social-close" class="overlay-close" title="Close">&times;</button>
      </div>
      <div id="social-platform-row" class="social-platform-row">
        <button class="social-platform-btn" data-platform="twitter">𝕏 Twitter</button>
        <button class="social-platform-btn" data-platform="linkedin">in LinkedIn</button>
        <button class="social-platform-btn" data-platform="threads">@ Threads</button>
      </div>
      <div id="social-output" class="social-output" style="display:none;">
        <textarea id="social-post-text" class="social-post-textarea" readonly></textarea>
        <div class="social-action-row">
          <button id="social-copy-btn" class="sp-btn-mini">Copy</button>
          <a id="social-open-link" class="sp-btn-mini sp-link" target="_blank" rel="noopener">Open ↗</a>
        </div>
      </div>
    </div>
  </div>


</div><!-- /.side-panel-container -->

<script src="./side-panel.js"></script>
</body>
</html>
