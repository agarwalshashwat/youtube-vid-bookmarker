<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookmarker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="popup-root">

  <div class="popup-header">
    <div class="popup-logo">
      <span class="popup-logo-icon">▶</span>
      <span class="popup-logo-text">Clipmark</span>
    </div>
    <div class="popup-header-actions">
      <button id="summarize-btn" class="summarize-btn" title="AI summary of your bookmarks">✦ Summary</button>
      <button id="share-btn" class="share-btn" title="Share bookmarks for this video">↗ Share</button>
      <button id="post-btn" class="post-btn" title="Post insights to social media (Pro)">✍ Post</button>
      <div class="popup-header-sep"></div>
      <a href="bookmarks.html" id="view-all-bookmarks" class="all-bookmarks-link" title="All bookmarks">All</a>
      <button id="signin-btn" class="signin-btn" title="Sign in to sync across devices" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
      <div id="user-chip" class="user-chip" style="display:none"></div>
    </div>
  </div>

  <div id="status-message" class="status-message"></div>

  <div class="video-context">
    <div class="video-context-title" id="video-title">🎬 <span class="title-shimmer"></span></div>
    <div class="timestamp-pill" id="current-time">⏱ 00:00</div>
  </div>

  <div id="revision-today" class="revision-today" style="display:none;"></div>

  <div id="bookmark-list">
    <div class="loading-spinner" style="display:none;">Loading…</div>
  </div>

  <div id="social-panel" class="social-panel" style="display:none;">
    <div class="social-panel-header">
      <span class="social-panel-title">✍ Post Insights</span>
      <button id="social-close" class="summary-close" title="Close">&times;</button>
    </div>
    <div id="social-platform-row" class="social-platform-row">
      <button class="social-platform-btn" data-platform="twitter">𝕏 Twitter</button>
      <button class="social-platform-btn" data-platform="linkedin">in LinkedIn</button>
      <button class="social-platform-btn" data-platform="threads">@ Threads</button>
    </div>
    <div id="social-output" class="social-output" style="display:none;">
      <textarea id="social-post-text" class="social-post-textarea" readonly></textarea>
      <div class="social-action-row">
        <button id="social-copy-btn" class="social-copy-btn">Copy</button>
        <a id="social-open-link" class="social-open-link" target="_blank" rel="noopener">Open ↗</a>
      </div>
    </div>
  </div>

  <div id="summary-panel" class="summary-panel" style="display:none;">
    <div class="summary-panel-header">
      <span class="summary-panel-title">✦ AI Summary</span>
      <button id="summary-close" class="summary-close" title="Close">&times;</button>
    </div>
    <div id="summary-content" class="summary-content"></div>
  </div>

  <div class="popup-footer">
    <div class="description-row">
      <input type="text" id="description" placeholder="Add a note or tag this moment (#important)">
      <button id="auto-fill-btn" class="auto-fill-btn" title="Auto-fill from video transcript">✦ Auto</button>
    </div>
    <div class="quick-tags">
      <button class="quick-tag-btn" data-tag="important">#important</button>
      <button class="quick-tag-btn" data-tag="note">#note</button>
      <button class="quick-tag-btn" data-tag="review">#review</button>
      <button class="quick-tag-btn" data-tag="idea">#idea</button>
    </div>
    <div id="tag-suggestions" class="tag-suggestions" style="display:none;"></div>
    <button id="add-bookmark">Save Moment</button>
  </div>

  <div id="error-message" class="error-message"></div>

</div><!-- /.popup-root -->
<script src="popup.js"></script>
</body>
</html>
