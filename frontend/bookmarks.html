<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks — YouTube Bookmarker</title>
    <link rel="stylesheet" href="bookmarks.css">
</head>
<body class="bookmarks-page">

    <div class="page-header">
        <div class="page-logo">
            <span class="popup-logo-icon">▶</span>
            <span class="page-title">YouTube Bookmarker</span>
        </div>
    </div>

    <div class="container">

        <div class="toolbar">
            <input type="text" id="search-input" placeholder="Search notes, titles, or timestamps..." class="toolbar-search">
            <select id="sort-select" class="toolbar-sort">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="timestamp">By timestamp</option>
            </select>
            <button id="bulk-delete-btn" class="toolbar-btn toolbar-btn--danger" style="display:none">Delete (<span id="bulk-count">0</span>)</button>
            <div class="view-toggle">
                <button id="view-cards"    class="toolbar-btn view-btn" title="Card view">⊞</button>
                <button id="view-timeline" class="toolbar-btn view-btn" title="Timeline view">⏱</button>
            </div>
            <div class="toolbar-actions">
                <button id="export-json" class="toolbar-btn">↓ JSON</button>
                <button id="export-csv"  class="toolbar-btn">↓ CSV</button>
                <button id="export-md"   class="toolbar-btn">↓ MD</button>
                <button id="import-btn"  class="toolbar-btn toolbar-btn--import">↑ Import</button>
                <input type="file" id="import-input" accept=".json" style="display:none">
            </div>
        </div>

        <div id="bookmarks-container">
            <div class="loading-spinner">Loading bookmarks…</div>
        </div>

    </div>

    <div id="error-toast"   class="error-toast"></div>
    <div id="success-toast" class="success-toast"></div>
    <script src="bookmarks.js"></script>
</body>
</html>
